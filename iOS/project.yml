name: Pettybox
options:
  bundleIdPrefix: com.shimondeitel.pettycash
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pettybox:
    type: application
    platform: iOS
    sources:
      - path: Pettybox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettycash
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pettybox/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PettyboxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PettyboxTests
      - path: Pettybox.storekit
    dependencies:
      - target: Pettybox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettycash.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PettyboxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PettyboxUITests
    dependencies:
      - target: Pettybox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettycash.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pettybox:
    build:
      targets:
        Pettybox: all
        PettyboxTests: [test]
        PettyboxUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Pettybox.storekit
    test:
      config: Debug
      storeKitConfiguration: Pettybox.storekit
      targets:
        - PettyboxTests
        - PettyboxUITests
    archive:
      config: Release
